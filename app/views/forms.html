<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulaire Bootstrap 5</title>
<!-- Inclure Bootstrap 5 CSS -->
<link rel="stylesheet" href="css/bootstrap.min.css">
 <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
<h2 class="titre_spe">Formulaire d'inscription</h2>
<form>
<!-- Champ de texte -->
<div class="mb-3">
<label for="nom" class="form-label">Nom Complet :</label>
<input type="text" class="form-control" id="nom" placeholder="Entrez votre nom complet">
</div>
<div class="mb-3">
<label for="mail" class="form-label">Adresse e-mail :</label>
<input type="text" class="form-control" id="mail" placeholder="exemple@domaine.com">
</div>
<div class="mb-3">
<label for="date" class="form-label">Date de naissance :</label>
<input type="text" class="form-control" id="date" placeholder="jj/mm/aa">
</div>

<!-- Boutons radio -->
<div class="mb-3">
<label for="nom" class="form-label">Genre :</label>
<div class="form-check">
<input class="form-check-input" type="radio" name="exampleRadios" id="exampleRadios1" value="option1"
checked>
<label class="form-check-label" for="exampleRadios1">
Homme
</label>
</div>
<div class="form-check">
<input class="form-check-input" type="radio" name="exampleRadios" id="exampleRadios2" value="option2">
<label class="form-check-label" for="exampleRadios2">
Femme
</label>
</div>
<div class="form-check">
<input class="form-check-input" type="radio" name="exampleRadios" id="exampleRadios2" value="option2">
<label class="form-check-label" for="exampleRadios2">
Autre
</label>
</div>
</div>
<!-- Sélection -->
<div class="mb-3">
<label for="exampleFormControlSelect1" class="form-label" >Ville :</label>
<select class="form-select" id="exampleFormControlSelect1" >
<option>--Séléctionnez votre ville--</option>
<option>Lyon</option>
<option>Grenoble</option>
<option>Paris</option>
<option>Toulouse</option>
<option>Valence</option>
</select>
</div>
<!-- Textarea -->
<div class="mb-3">
<label for="exampleFormControlTextarea1" class="form-label">Message ou remarque :</label>
<textarea class="form-control" id="exampleFormControlTextarea1" rows="3" placeholder="Votre message..." ></textarea>
</div>

<!-- Case à cocher -->
<div class="mb-3 form-check">
<input type="checkbox" class="form-check-input" id="exampleCheck1">
<label class="form-check-label" for="exampleCheck1">J'accepte les conditions d'utilisation.</label>
</div>
<!-- Bouton de soumission -->
<button type="submit" class="btn btn-secondary">Réinitialiser</button>
<button type="submit" class="btn btn-success" style="float: right;">Envoyer</button>
</form>
</div>


</body>
</html>
